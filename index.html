<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>belcik299</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg"></div>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="left">
            <h1>belcik299</h1>
            <p class="subtitle">Powered by Redstone</p>
        </div>

        <div class="right">
            <a href="https://github.com/belcik299" target="_blank" class="link-card">
                <span class="label">github</span>
                <span class="arrow">→</span>
            </a>
            <a href="https://app.hackthebox.com/public/users/2499187" target="_blank" class="link-card">
                <span class="label">hackthebox</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <button class="music-btn" id="musicBtn">♫</button>

    <footer>
        <p>© 2026 belcik299</p>
    </footer>

    <script>
        const container = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(star);
        }
    </script>
    <script>
        let audioCtx, masterGain, playing = false;
        const btn = document.getElementById('musicBtn');
        let melodyTimeout;

        function noise(ctx, len) {
            const buf = ctx.createBuffer(1, ctx.sampleRate * len, ctx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
            const src = ctx.createBufferSource();
            src.buffer = buf;
            return src;
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.3;
            masterGain.connect(audioCtx.destination);

            const melodyNotes = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 1046.5, 1174.66, 1046.5, 880.00, 783.99, 698.46];
            const bassLine = [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 261.63, 293.66, 261.63, 220.00, 196.00, 174.61];
            let step = 0, tickCount = 0;

            function kick() {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
                g.gain.setValueAtTime(0.3, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.connect(g);
                g.connect(masterGain);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.15);
            }

            function snare() {
                const n = noise(audioCtx, 0.12);
                const g = audioCtx.createGain();
                const f = audioCtx.createBiquadFilter();
                f.type = 'highpass';
                f.frequency.value = 1000;
                g.gain.setValueAtTime(0.15, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                n.connect(f);
                f.connect(g);
                g.connect(masterGain);
                n.start(audioCtx.currentTime);
                n.stop(audioCtx.currentTime + 0.12);
            }

            function hat(open) {
                const n = noise(audioCtx, open ? 0.3 : 0.04);
                const g = audioCtx.createGain();
                const f = audioCtx.createBiquadFilter();
                f.type = 'highpass';
                f.frequency.value = open ? 5000 : 7000;
                g.gain.setValueAtTime(open ? 0.06 : 0.1, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (open ? 0.3 : 0.04));
                n.connect(f);
                f.connect(g);
                g.connect(masterGain);
                n.start(audioCtx.currentTime);
                n.stop(audioCtx.currentTime + (open ? 0.3 : 0.04));
            }

            function pluck(freq, time, vol) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = freq;
                g.gain.setValueAtTime(vol, audioCtx.currentTime + time);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + time + 0.12);
                osc.connect(g);
                g.connect(masterGain);
                osc.start(audioCtx.currentTime + time);
                osc.stop(audioCtx.currentTime + time + 0.12);
            }

            function tick() {
                if (!playing) return;
                const bpm = 140;
                const beatMs = 60000 / bpm;
                const bar = 16;

                const t = tickCount % bar;
                if (t % bar === 0) kick();
                if (t % bar === 8) kick();
                if (t % 4 === 2) snare();
                if (t % 4 === 6) snare();
                if (t % 2 === 1) hat(false);
                if (t % 16 === 14) hat(true);

                if (t % 4 === 0 || t % 4 === 2) {
                    const note = melodyNotes[step % melodyNotes.length];
                    pluck(note, 0, 0.07);

                    const bassN = bassLine[Math.floor(tickCount / 4) % bassLine.length];
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = bassN;
                    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                    osc.connect(g);
                    g.connect(masterGain);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.3);
                }

                step++;
                tickCount++;
                melodyTimeout = setTimeout(tick, beatMs / 4);
            }

            btn.onclick = () => {
                if (playing) {
                    playing = false;
                    clearTimeout(melodyTimeout);
                    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                    btn.classList.remove('on');
                } else {
                    playing = true;
                    step = 0;
                    tickCount = 0;
                    masterGain.gain.value = 0.3;
                    tick();
                    btn.classList.add('on');
                }
            };
        }

        btn.addEventListener('click', () => {
            if (!audioCtx) initAudio();
        }, { once: true });
    </script>
</body>
</html>
