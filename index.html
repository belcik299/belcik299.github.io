<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>belcik299</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg"></div>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="left">
            <h1>belcik299</h1>
            <p class="subtitle">Powered by Redstone</p>
        </div>

        <div class="right">
            <a href="https://github.com/belcik299" target="_blank" class="link-card">
                <span class="label">github</span>
                <span class="arrow">→</span>
            </a>
            <a href="https://app.hackthebox.com/public/users/2499187" target="_blank" class="link-card">
                <span class="label">hackthebox</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <button class="music-btn" id="musicBtn">♫</button>

    <footer>
        <p>© 2026 belcik299</p>
    </footer>

    <script>
        const container = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(star);
        }
    </script>
    <script>
        let audioCtx, masterGain, playing = false;
        const btn = document.getElementById('musicBtn');
        let bassInterval, melodyTimeout;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.25;
            masterGain.connect(audioCtx.destination);

            const melody = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 523.25, 587.33, 659.25, 523.25, 440.00, 392.00];
            const bass = [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 261.63, 293.66, 261.63, 220.00, 196.00, 174.61];
            let step = 0;

            function playMelody() {
                if (!playing) return;
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = melody[step % melody.length];
                g.gain.setValueAtTime(0.08, audioCtx.currentTime);
                g.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.05);
                g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
                osc.connect(g);
                g.connect(masterGain);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.25);

                const osc2 = audioCtx.createOscillator();
                const g2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.value = melody[(step + 7) % melody.length] * 0.5;
                g2.gain.setValueAtTime(0.06, audioCtx.currentTime);
                g2.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc2.connect(g2);
                g2.connect(masterGain);
                osc2.start(audioCtx.currentTime);
                osc2.stop(audioCtx.currentTime + 0.4);

                step++;
                melodyTimeout = setTimeout(playMelody, 220);
            }

            function playBass() {
                if (!playing) return;
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = bass[Math.floor(Math.random() * bass.length)];
                g.gain.setValueAtTime(0.15, audioCtx.currentTime);
                g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                osc.connect(g);
                g.connect(masterGain);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.6);
            }

            let beat = 0;
            function playBeat() {
                if (!playing) return;
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = beat % 2 === 0 ? 80 : 60;
                g.gain.setValueAtTime(0.2, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.connect(g);
                g.connect(masterGain);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.08);

                if (beat % 4 === 0) playBass();
                beat++;
            }

            function fullLoop() {
                if (!playing) return;
                playBeat();
                setTimeout(fullLoop, 180);
            }

            btn.onclick = () => {
                if (playing) {
                    playing = false;
                    clearTimeout(melodyTimeout);
                    clearInterval(bassInterval);
                    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                    btn.classList.remove('on');
                } else {
                    playing = true;
                    masterGain.gain.value = 0.25;
                    step = 0;
                    beat = 0;
                    playMelody();
                    fullLoop();
                    btn.classList.add('on');
                }
            };
        }

        btn.addEventListener('click', () => {
            if (!audioCtx) initAudio();
        }, { once: true });
    </script>
</body>
</html>
