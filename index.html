<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>belcik299</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg"></div>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="left">
            <h1>belcik299</h1>
            <p class="subtitle">Powered by Redstone</p>
        </div>

        <div class="right">
            <a href="https://github.com/belcik299" target="_blank" class="link-card">
                <span class="label">github</span>
                <span class="arrow">→</span>
            </a>
            <a href="https://app.hackthebox.com/public/users/2499187" target="_blank" class="link-card">
                <span class="label">hackthebox</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <button class="music-btn" id="musicBtn">♫</button>

    <footer>
        <p>© 2026 belcik299</p>
    </footer>

    <script>
        const container = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(star);
        }
    </script>
    <script>
        let audioCtx, gainNode, playing = false;
        const btn = document.getElementById('musicBtn');

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.gain.value = 0.3;
            gainNode.connect(audioCtx.destination);

            const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33];
            let timeout;

            function playNote() {
                if (!playing) return;
                const osc = audioCtx.createOscillator();
                const noteGain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = notes[Math.floor(Math.random() * notes.length)];
                noteGain.gain.setValueAtTime(0, audioCtx.currentTime);
                noteGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.5);
                noteGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.5);
                osc.connect(noteGain);
                noteGain.connect(gainNode);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 2.5);
                timeout = setTimeout(playNote, Math.random() * 3000 + 2000);
            }

            btn.onclick = () => {
                if (playing) {
                    playing = false;
                    clearTimeout(timeout);
                    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                    btn.textContent = '♫';
                    btn.classList.remove('on');
                } else {
                    playing = true;
                    gainNode.gain.value = 0.3;
                    playNote();
                    btn.textContent = '♫';
                    btn.classList.add('on');
                }
            };
        }

        btn.addEventListener('click', () => {
            if (!audioCtx) initAudio();
        }, { once: true });
    </script>
</body>
</html>
