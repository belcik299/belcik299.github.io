<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>belcik299</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg"></div>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="left">
            <h1>belcik299</h1>
            <p class="subtitle">Powered by Redstone</p>
        </div>

        <div class="right">
            <a href="https://github.com/belcik299" target="_blank" class="link-card">
                <span class="label">github</span>
                <span class="arrow">→</span>
            </a>
            <a href="https://app.hackthebox.com/public/users/2499187" target="_blank" class="link-card">
                <span class="label">hackthebox</span>
                <span class="arrow">→</span>
            </a>
            <a href="https://ctflearn.com/user/Belcik299" target="_blank" class="link-card">
                <span class="label">ctflearn</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <footer>
        <p>© 2026 belcik299</p>
    </footer>

    <script>
        const container = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(star);
        }

        const cursorFrames = [
            'https://sweezy-cursors.com/wp-content/uploads/cursor/minecraft-enchanted-trident-animated/minecraft-enchanted-trident-animated-cursor-1.png',
            'https://sweezy-cursors.com/wp-content/uploads/cursor/minecraft-enchanted-trident-animated/minecraft-enchanted-trident-animated-cursor-2.png',
            'https://sweezy-cursors.com/wp-content/uploads/cursor/minecraft-enchanted-trident-animated/minecraft-enchanted-trident-animated-custom-cursor-3.png',
            'https://sweezy-cursors.com/wp-content/uploads/cursor/minecraft-enchanted-trident-animated/minecraft-enchanted-trident-animated-custom-cursor-4.png',
            'https://sweezy-cursors.com/wp-content/uploads/cursor/minecraft-enchanted-trident-animated/minecraft-enchanted-trident-animated-custom-cursor-5.png',
            'https://sweezy-cursors.com/wp-content/uploads/cursor/minecraft-enchanted-trident-animated/minecraft-enchanted-trident-animated-custom-cursor-6.png',
            'https://sweezy-cursors.com/wp-content/uploads/cursor/minecraft-enchanted-trident-animated/minecraft-enchanted-trident-animated-custom-cursor-7.png',
            'https://sweezy-cursors.com/wp-content/uploads/cursor/minecraft-enchanted-trident-animated/minecraft-enchanted-trident-animated-custom-cursor-8.png'
        ];

        const cursorEl = document.createElement('div');
        cursorEl.id = 'customCursor';
        cursorEl.style.cssText = 'position:fixed;width:32px;height:32px;pointer-events:none;z-index:99999;transform:translate(-6px,-6px);image-rendering:pixelated;display:none';
        const img = document.createElement('img');
        img.style.cssText = 'width:100%;height:100%;image-rendering:pixelated';
        cursorEl.appendChild(img);
        document.body.appendChild(cursorEl);

        let frameIdx = 0;
        setInterval(() => {
            if (cursorEl.style.display !== 'none') {
                frameIdx = (frameIdx + 1) % cursorFrames.length;
                img.src = cursorFrames[frameIdx];
            }
        }, 75);

        document.addEventListener('mousemove', e => {
            cursorEl.style.display = 'block';
            cursorEl.style.left = e.clientX + 'px';
            cursorEl.style.top = e.clientY + 'px';
        });

        document.addEventListener('mouseleave', () => {
            cursorEl.style.display = 'none';
        });
    </script>
</body>
</html>
