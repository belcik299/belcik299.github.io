<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>belcik299</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg"></div>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="left">
            <h1>belcik299</h1>
            <p class="subtitle">Powered by Redstone</p>
        </div>

        <div class="right">
            <a href="https://github.com/belcik299" target="_blank" class="link-card">
                <span class="label">github</span>
                <span class="arrow">→</span>
            </a>
            <a href="https://app.hackthebox.com/public/users/2499187" target="_blank" class="link-card">
                <span class="label">hackthebox</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <button class="music-btn" id="musicBtn">♫</button>

    <footer>
        <p>© 2026 belcik299</p>
    </footer>

    <script>
        const container = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(star);
        }
    </script>
    <script>
        let audioCtx, masterGain, playing = false;
        const btn = document.getElementById('musicBtn');
        let melodyTimeout;

        function noise(ctx, len) {
            const buf = ctx.createBuffer(1, ctx.sampleRate * len, ctx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
            const src = ctx.createBufferSource();
            src.buffer = buf;
            return src;
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.3;
            masterGain.connect(audioCtx.destination);

            let tickCount = 0;

            function kick() {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.12);
                g.gain.setValueAtTime(0.35, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                osc.connect(g);
                g.connect(masterGain);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.12);
            }

            function snare() {
                const n = noise(audioCtx, 0.1);
                const g = audioCtx.createGain();
                const f = audioCtx.createBiquadFilter();
                f.type = 'highpass';
                f.frequency.value = 800;
                g.gain.setValueAtTime(0.2, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                n.connect(f);
                f.connect(g);
                g.connect(masterGain);
                n.start(audioCtx.currentTime);
                n.stop(audioCtx.currentTime + 0.1);
            }

            function hat() {
                const n = noise(audioCtx, 0.03);
                const g = audioCtx.createGain();
                const f = audioCtx.createBiquadFilter();
                f.type = 'highpass';
                f.frequency.value = 8000;
                g.gain.setValueAtTime(0.08, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
                n.connect(f);
                f.connect(g);
                g.connect(masterGain);
                n.start(audioCtx.currentTime);
                n.stop(audioCtx.currentTime + 0.03);
            }

            function powerChord(freq, time, dur) {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.value = freq;
                g.gain.setValueAtTime(0, audioCtx.currentTime + time);
                g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + time + 0.02);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + time + dur);
                osc.connect(g);
                g.connect(masterGain);
                osc.start(audioCtx.currentTime + time);
                osc.stop(audioCtx.currentTime + time + dur);

                const osc2 = audioCtx.createOscillator();
                const g2 = audioCtx.createGain();
                osc2.type = 'sawtooth';
                osc2.frequency.value = freq * 1.5;
                g2.gain.setValueAtTime(0, audioCtx.currentTime + time);
                g2.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + time + 0.02);
                g2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + time + dur);
                osc2.connect(g2);
                g2.connect(masterGain);
                osc2.start(audioCtx.currentTime + time);
                osc2.stop(audioCtx.currentTime + time + dur);
            }

            function lavaChant() {
                const notes = [392, 440, 494, 523];
                notes.forEach((n, i) => {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = n;
                    g.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.15);
                    g.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + i * 0.15 + 0.03);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.12);
                    osc.connect(g);
                    g.connect(masterGain);
                    osc.start(audioCtx.currentTime + i * 0.15);
                    osc.stop(audioCtx.currentTime + i * 0.15 + 0.12);
                });
            }

            function rockMelody() {
                const riff = [523.25, 0, 659.25, 0, 783.99, 0, 659.25, 0, 587.33, 0, 659.25, 0, 523.25, 0, 440, 0];
                riff.forEach((n, i) => {
                    if (n === 0) return;
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = n;
                    const t = i * 0.08;
                    g.gain.setValueAtTime(0, audioCtx.currentTime + t);
                    g.gain.linearRampToValueAtTime(0.07, audioCtx.currentTime + t + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + t + 0.06);
                    osc.connect(g);
                    g.connect(masterGain);
                    osc.start(audioCtx.currentTime + t);
                    osc.stop(audioCtx.currentTime + t + 0.06);
                });
            }

            let section = 0;
            function tick() {
                if (!playing) return;
                const bpm = 160;
                const beatMs = 60000 / bpm;

                const t = tickCount % 32;

                if (t % 4 === 0) kick();
                if (t % 4 === 2) snare();
                if (t % 2 === 1) hat();

                if (tickCount % 128 === 0) {
                    section = (section + 1) % 4;
                    if (section % 2 === 0) rockMelody();
                    else lavaChant();
                }

                if (t % 8 === 0) {
                    const chords = [[196, 0], [220, 0], [261.63, 0], [220, 0]];
                    const c = chords[Math.floor(tickCount / 8) % 4];
                    if (c) powerChord(c[0], 0, 0.4);
                }

                tickCount++;
                melodyTimeout = setTimeout(tick, beatMs / 4);
            }

            btn.onclick = () => {
                if (playing) {
                    playing = false;
                    clearTimeout(melodyTimeout);
                    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                    btn.classList.remove('on');
                } else {
                    playing = true;
                    tickCount = 0;
                    section = 0;
                    masterGain.gain.value = 0.3;
                    tick();
                    btn.classList.add('on');
                }
            };
        }

        btn.addEventListener('click', () => {
            if (!audioCtx) initAudio();
        }, { once: true });
    </script>
</body>
</html>
