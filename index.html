<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>belcik299</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg"></div>
    <div class="fog"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="left">
            <h1>belcik299</h1>
            <p class="subtitle">CTF Player / Security Enthusiast</p>
        </div>

        <div class="right">
            <a href="https://github.com/belcik299" target="_blank" class="link-card">
                <span class="label">github</span>
                <span class="arrow">→</span>
            </a>
            <a href="https://app.hackthebox.com/public/users/2499187" target="_blank" class="link-card">
                <span class="label">hackthebox</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <footer>
        <p>© 2026 belcik299</p>
    </footer>

    <script>
        const colors = ['#33ff33', '#55ff55', '#88ff88', '#66ff99', '#44dd44'];
        const container = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const dot = document.createElement('div');
            dot.className = 'particle';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.top = Math.random() * 100 + '%';
            dot.style.width = dot.style.height = (Math.random() * 4 + 2) + 'px';
            dot.style.background = colors[Math.floor(Math.random() * colors.length)];
            dot.style.animationDuration = (Math.random() * 6 + 4) + 's';
            dot.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(dot);
        }
    </script>
</body>
</html>
